<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('frontend/css/styles'); ?>
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div class="login-wrapper" id="loginWrapper">
    <div class="login-card">
      <?!= include('frontend/logo'); ?>
      <h1>Natural Resvex</h1>
      <p class="login-subtitulo">Área Comercial</p>
      <p class="login-instruccion">Ingresa con tu usuario y contraseña</p>
      <p class="login-version">v1</p>

      <div class="mensaje-error" id="mensajeError"></div>

      <form id="formLogin">
        <div class="campo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" autocomplete="username" required>
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primario" id="btnLogin">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- ===== APP (post-login) ===== -->
  <div class="app-shell" id="appShell">
    <div class="topbar">
      <div class="usuario-info">
        <strong id="nombreUsuario"></strong> — <span id="rolUsuario"></span>
      </div>
      <div class="topbar-acciones">
        <button class="btn-secundario" id="btnActualizarGlobal">↻ Actualizar</button>
        <select class="btn-secundario" id="selectAutoActualizar">
          <option value="0">Manual</option>
          <option value="30">Cada 30 seg</option>
          <option value="60">Cada 1 min</option>
          <option value="300">Cada 5 min</option>
        </select>
        <button class="btn-secundario" id="btnLogout">Cerrar sesión</button>
      </div>
    </div>

    <div class="banner-anuncios" id="bannerAnuncios"></div>

    <div class="contenido">
      <div class="menu-lateral-container">
        <div class="menu-logo"><?!= include('frontend/logo'); ?></div>
        <div class="menu-lateral" id="menuLateral"></div>
      </div>
      <div class="panel-principal" id="panelPrincipal"></div>
    </div>
  </div>

  <?!= include('frontend/js/app.js'); ?>
</body>
</html>
