<!DOCTYPE html>
<html>
<head>
  <base target="_top">

</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div class="login-wrapper" id="loginWrapper">
    <div class="login-card">
      <h1>Gestión de Asesores</h1>

      <div class="mensaje-error" id="mensajeError"></div>

      <form id="formLogin">
        <div class="campo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" autocomplete="username" required>
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primario" id="btnLogin">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- ===== APP (post-login) ===== -->
  <div class="app-shell" id="appShell">
    <div class="topbar">
      <div class="usuario-info">
        <strong id="nombreUsuario"></strong> — <span id="rolUsuario"></span>
      </div>
      <button class="btn-secundario" id="btnLogout">Cerrar sesión</button>
    </div>

    <div class="contenido">
      <div class="menu-lateral" id="menuLateral"></div>
      <div class="panel-principal" id="panelPrincipal"></div>
    </div>
  </div>

</html>
