<style>
  :root {
    --color-primario: #2f6fa8;
    --color-primario-oscuro: #1e4f7d;
    --color-acento: #6fb238;
    --color-fondo: #eef1f4;
    --color-texto: #222;
    --color-borde: #dbe1e8;
    --color-error: #c0392b;
    --radio: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--color-fondo);
    color: var(--color-texto);
  }

  /* ---- Login ---- */
  .login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: #fff;
    border-radius: var(--radio);
    box-shadow: 0 8px 30px rgba(0,0,0,0.10);
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-logo {
    width: 130px;
    height: auto;
    margin: 0 auto 16px;
    display: block;
  }

  .login-card h1 {
    font-size: 22px;
    margin: 0 0 4px;
    color: var(--color-primario-oscuro);
  }

  .login-subtitulo {
    font-size: 14px;
    color: var(--color-acento);
    margin: 0 0 4px;
    font-weight: 600;
  }

  .login-instruccion {
    font-size: 13px;
    color: #667;
    margin: 0 0 20px;
  }

  .login-version {
    font-size: 11px;
    color: #99a;
    margin: 0 0 20px;
  }

  .campo {
    margin-bottom: 16px;
    text-align: left;
  }

  .campo label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: #555;
  }

  .campo input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--color-borde);
    border-radius: var(--radio);
    font-size: 14px;
  }

  .campo input:focus {
    outline: none;
    border-color: var(--color-primario);
  }

  .btn-primario {
    width: 100%;
    padding: 11px;
    background: var(--color-primario);
    color: #fff;
    border: none;
    border-radius: var(--radio);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-primario:hover { background: var(--color-primario-oscuro); }
  .btn-primario:disabled { opacity: 0.6; cursor: default; }

  .mensaje-error {
    background: #fdecea;
    color: var(--color-error);
    padding: 10px 12px;
    border-radius: var(--radio);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  /* ---- App (post-login) ---- */
  .app-shell { display: none; min-height: 100vh; }

  .topbar {
    background: #fff;
    border-bottom: 1px solid var(--color-borde);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar .usuario-info { font-size: 14px; }
  .topbar .usuario-info strong { color: var(--color-primario-oscuro); }

  .btn-secundario {
    background: transparent;
    border: 1px solid var(--color-borde);
    padding: 7px 14px;
    border-radius: var(--radio);
    cursor: pointer;
    font-size: 13px;
  }

  .contenido {
    display: flex;
    max-width: 1800px;
    margin: 0 auto;
    padding: 20px 20px;
    gap: 20px;
  }

  .menu-lateral-container {
    width: 190px;
    flex-shrink: 0;
  }

  .menu-logo {
    text-align: center;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--color-borde);
  }

  .menu-logo img {
    width: 90px;
    height: auto;
  }

  .menu-lateral button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 10px 14px;
    margin-bottom: 6px;
    background: #fff;
    border: 1px solid var(--color-borde);
    border-radius: var(--radio);
    cursor: pointer;
    font-size: 14px;
  }

  .menu-lateral button:hover { border-color: var(--color-primario); }

  .panel-principal {
    flex: 1;
    background: #fff;
    border: 1px solid var(--color-borde);
    border-radius: var(--radio);
    padding: 24px;
    min-height: 300px;
  }

  /* ---- Responsive (celular) ---- */
  @media (max-width: 720px) {
    .contenido { flex-direction: column; padding: 16px; }
    .menu-lateral-container { width: 100%; }
  }

  /* ---- Módulo Usuarios ---- */
  .modulo-titulo {
    font-size: 17px;
    margin: 0 0 20px;
    color: var(--color-primario-oscuro);
  }

  .form-usuario {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    background: var(--color-fondo);
    border: 1px solid var(--color-borde);
    border-radius: var(--radio);
    padding: 18px;
    margin-bottom: 28px;
  }

  .form-usuario .campo { margin-bottom: 0; }
  .form-usuario .campo-full { grid-column: 1 / -1; }

  .form-usuario select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--color-borde);
    border-radius: var(--radio);
    font-size: 14px;
    background: #fff;
  }

  .form-usuario .btn-primario {
    grid-column: 1 / -1;
    width: auto;
    padding: 10px 24px;
    justify-self: start;
  }

  .mensaje-exito {
    background: #eaf6e6;
    color: #2e7d32;
    padding: 10px 12px;
    border-radius: var(--radio);
    font-size: 13px;
    margin-bottom: 16px;
  }

  .tabla-usuarios {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  .tabla-usuarios th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid var(--color-borde);
    color: #667;
    font-size: 12px;
    text-transform: uppercase;
  }

  .tabla-usuarios td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--color-borde);
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-activo { background: #eaf6e6; color: #2e7d32; }
  .badge-inactivo { background: #fdecea; color: var(--color-error); }

  .btn-link {
    background: none;
    border: none;
    color: var(--color-primario);
    cursor: pointer;
    font-size: 13px;
    padding: 0;
    text-decoration: underline;
  }

  @media (max-width: 600px) {
    .form-usuario { grid-template-columns: 1fr; }
  }

  /* ---- Barra superior: acciones a la derecha ---- */
  .topbar-acciones {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .topbar-acciones select.btn-secundario {
    cursor: pointer;
  }

  /* ---- Anuncios ---- */
  .banner-anuncios {
    max-width: 1800px;
    margin: 16px auto 0;
    padding: 0 20px;
  }

  .anuncio {
    background: #fff8e1;
    border: 1px solid #f0d98c;
    border-radius: var(--radio);
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    font-size: 14px;
    color: #6b5900;
  }

  .anuncio button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #6b5900;
    line-height: 1;
  }

  /* ---- Fila expandible en tablas ---- */
  .btn-expandir {
    background: none;
    border: 1px solid var(--color-borde);
    border-radius: 50%;
    width: 22px;
    height: 22px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }

  .fila-detalle td {
    background: var(--color-fondo);
    font-size: 13px;
    padding: 10px 14px;
  }

  .fila-detalle .grid-detalle {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 6px 18px;
  }
</style>
